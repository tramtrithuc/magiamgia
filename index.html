<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D2 SALE - Công cụ áp mã Shopee</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        shopee: '#ee4d2d',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-center p-4" style="background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 16px 16px;">

    <div class="w-full max-w-md bg-white rounded-3xl p-6 shadow-sm border border-slate-100 relative">
        
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 text-white font-bold p-2 rounded-lg text-xs tracking-wider">SALE</div>
                <span class="font-bold text-slate-700 text-lg">Mở Nhanh Mã</span>
            </div>
            <span class="text-orange-500 bg-orange-50 text-xs px-3 py-1 rounded-full border border-orange-200 font-medium">⚡ 1 link / lần</span>
        </div>

        <div class="p-[2px] rounded-2xl bg-gradient-to-tr from-pink-500 via-purple-500 to-blue-500">
            <div class="bg-white p-4 rounded-[14px] flex flex-col gap-3">
                
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Link sản phẩm Shopee</label>
                    <input type="text" id="shopee-link" placeholder="https://shopee.vn/..." class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-purple-500 text-sm">
                </div>

                <button onclick="pasteLink()" class="w-full bg-violet-600 hover:bg-violet-700 text-white font-medium py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-sm">
                    📋 Dán sản phẩm
                </button>

                <button onclick="processLink()" class="w-full bg-gradient-to-r from-orange-300 to-pink-300 hover:opacity-90 text-slate-700 font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2">
                    🔗 Mở áp mã nhanh
                </button>

                <button onclick="copyLink()" class="w-full bg-slate-50 hover:bg-slate-100 text-slate-400 font-medium py-3 rounded-xl transition flex items-center justify-center gap-2 border border-slate-100">
                    📄 Sao chép link
                </button>
            </div>
        </div>
    </div>

    <div class="mt-6 bg-white/80 backdrop-blur px-5 py-2 rounded-full shadow-sm border border-slate-100 text-sm text-slate-600">
        🔥 Đã có <span class="font-bold text-purple-600" id="count-link">1,563</span> link được tạo hôm nay
    </div>
    
    <div class="mt-3 text-xs text-slate-400">⚡ Chỉ nhận 1 link Shopee mỗi lần</div>

    <script src="app.js"></script>
</body>
</html>
