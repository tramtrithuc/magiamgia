<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALESOC.VN - Hệ Thống Áp Mã Giảm Giá Khung Giờ</title>
    
    <!-- Nhúng Font Manrope và thư viện Icon giống hệt Salesoc -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-['Manrope'] bg-[#090d14] text-slate-200 min-h-screen flex flex-col items-center p-4 select-none">

    <div class="w-full max-w-md mt-2">
        <!-- Header Brand -->
        <div class="flex items-center justify-between mb-4 px-1">
            <h1 class="text-xl font-black tracking-wider text-white flex items-center gap-1">
                🔥 <span class="text-amber-500">SALE</span>SOC.VN
            </h1>
            <button class="text-slate-400 p-2 border border-slate-800 rounded-xl text-sm bg-[#11161d]">☰</button>
        </div>

        <!-- Khung Nhập Link -->
        <div class="bg-[#11161d] rounded-2xl p-4 border border-slate-800/80 shadow-xl mb-4">
            <div class="flex items-start gap-3 bg-red-950/20 border border-red-900/30 p-3 rounded-xl mb-4">
                <span class="text-xl mt-0.5">📺</span>
                <div class="text-xs">
                    <p class="font-bold text-red-400 uppercase tracking-wide">Áp Mã Giảm Giá</p>
                    <p class="text-slate-400 mt-1">Khung giờ back mã m9: 0-9-12-15-18-20.</p>
                    <p class="text-amber-500 font-medium mt-0.5">👉 Bấm vào đây để tham gia cộng đồng săn sale</p>
                </div>
            </div>

            <div class="flex items-center gap-2 bg-[#171f2c] border border-slate-800/60 px-3 py-1 rounded-full w-max text-[11px] text-green-400 mb-4">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Server sẵn sàng
            </div>

            <div class="grid grid-cols-2 gap-2 bg-[#171f2c] p-1 rounded-xl mb-4 border border-slate-800/50">
                <button class="bg-[#11161d] text-amber-500 text-xs font-bold py-2 rounded-lg border border-slate-800">Đơn lẻ</button>
                <button class="text-slate-500 text-xs font-medium py-2 rounded-lg">Lịch sử</button>
            </div>

            <div class="block text-[11px] font-bold text-slate-500 uppercase mb-3 tracking-wider">LINK SẢN PHẨM SHOPEE</div>
            <div class="relative flex items-center mb-4">
                <input type="text" id="input-url" placeholder="https://s.shopee.vn/..." class="w-full bg-[#171f2c] border border-slate-800 rounded-xl pl-4 pr-16 py-3.5 text-sm text-white focus:outline-none focus:border-amber-500 placeholder-slate-600">
                <button onclick="pasteClipboard()" class="absolute right-2 bg-[#2a241e] text-amber-500 text-xs px-3 py-1.5 rounded-lg font-bold border border-amber-500/20 hover:bg-amber-500/10 transition">Dán</button>
            </div>

            <button onclick="getLinkAndVouchers()" id="btn-submit" class="w-full bg-gradient-to-r from-amber-500 to-orange-600 hover:opacity-95 text-neutral-950 font-black py-3.5 rounded-xl text-sm transition flex items-center justify-center gap-2">
                <i class="fa-solid fa-cart-shopping text-sm"></i> Lấy link
            </button>
        </div>

        <!-- KHU VỰC HIỂN THỊ KẾT QUẢ ĐỘNG GIỐNG 100% ẢNH MẪU CỦA BẠN -->
        <div id="result-section" class="hidden space-y-4">
            
            <div class="text-center text-xs font-bold text-amber-600/90 uppercase tracking-widest pt-2">
                SẢN PHẨM VỪA THÊM
            </div>
            
            <!-- Card sản phẩm tự động cập nhật hình ảnh chuẩn -->
            <div class="bg-[#11161d] border border-slate-800/60 rounded-2xl p-4 flex gap-4 items-center shadow-2xl relative">
                <img id="prod-img" src="" class="w-24 h-24 object-cover rounded-xl bg-slate-900 border border-slate-800">
                <div class="flex-1 min-w-0">
                    <p id="prod-name" class="text-sm font-bold text-slate-200 line-clamp-2 leading-snug">
                        <!-- Tên thật tự bóc từ link sẽ đổ vào đây -->
                    </p>
                    <p id="prod-price" class="text-lg font-black text-orange-500 mt-3 tracking-wide">0đ</p>
                </div>
            </div>

            <!-- Vùng đổ danh sách mã giảm giá động chia vạch tinh tế -->
            <div id="voucher-container" class="space-y-3">
                <!-- Mã sẽ tự động render ra đây -->
            </div>

            <!-- Bộ 3 nút bấm điều hướng chuẩn mã hoa hồng -->
            <div class="grid grid-cols-3 gap-2 pt-1">
                <button id="btn-ytb" class="bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold py-3 rounded-xl text-xs flex items-center justify-center gap-1 shadow-md">
                    ➔ Mã YTB <i class="fa-regular fa-copy ml-0.5"></i>
                </button>
                <button id="btn-fb" class="bg-gradient-to-r from-sky-500 to-blue-600 text-white font-bold py-3 rounded-xl text-xs flex items-center justify-center gap-1 shadow-md">
                    ➔ Mã FB <i class="fa-regular fa-copy ml-0.5"></i>
                </button>
                <button id="btn-ig" class="bg-gradient-to-r from-pink-500 via-red-500 to-purple-600 text-white font-bold py-3 rounded-xl text-xs flex items-center justify-center gap-1 shadow-md">
                    ➔ Mã IG <i class="fa-regular fa-copy ml-0.5"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Bong bóng Zalo liên hệ -->
    <a href="https://zalo.me/0382279474" target="_blank" class="fixed bottom-6 right-6 w-14 h-14 bg-[#0068ff] rounded-full flex items-center justify-center text-white text-xs font-black shadow-2xl z-50 hover:scale-105 transition tracking-wide">
        Zalo
    </a>

    <!-- SCRIPT ĐIỀU PHỐI ĐỘNG CHỐNG KẸT -->
    <script>
        const SAFE_SVG_LOGO = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='%23f97316'><path d='M20 30h60v50H20z'/><path d='M35 30c0-10 5-15 15-15s15 5 15 15' fill='none' stroke='%23f97316' stroke-width='8'/></svg>";

        function safeBtoa(str) {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));
        }

        async function pasteClipboard() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('input-url').value = text;
            } catch (err) {
                alert("Hãy đè ngón tay vào ô nhập để tự dán liên kết!");
            }
        }

        async function getLinkAndVouchers() {
            const urlInput = document.getElementById('input-url').value.trim();
            const btnSubmit = document.getElementById('btn-submit');

            if (!urlInput || !urlInput.includes('shopee.vn')) {
                alert('Vui lòng dán chính xác liên kết sản phẩm Shopee!');
                return;
            }

            btnSubmit.innerText = "⏳ ĐANG ĐỒNG BỘ DỮ LIỆU SÀN...";
            btnSubmit.disabled = true;

            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('prod-img').src = SAFE_SVG_LOGO;
            document.getElementById('prod-name').innerHTML = `<i class="fa-solid fa-spinner animate-spin text-amber-500 mr-2"></i> Đang kết nối máy chủ trung tâm để bóc tách thông tin sản phẩm thật...`;
            document.getElementById('prod-price').innerText = "⌛ Đang quét giá...";

            const secureData = safeBtoa(urlInput);

            // 🌟 ĐOẠN ĐỔI MỚI CỨU MẠNG: Gọi trực tiếp sang máy chủ Hostinger của bạn thay vì gọi nội bộ GitHub
            try {
                const response = await fetch('https://darkseagreen-curlew-396713.hostingersite.com/api.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secure_data: secureData })
                });
                
                const result = await response.json();

                if (result.success) {
                    // Hiển thị tên thật bóc từ URL cực kỳ ảo diệu
                    document.getElementById('prod-name').innerHTML = `<span class="text-orange-500 text-xs mr-1">🛍️</span> ` + result.product.name;
                    document.getElementById('prod-price').innerText = result.product.price;
                    
                    if (result.product.image) {
                        document.getElementById('prod-img').src = result.product.image;
                    } else {
                        document.getElementById('prod-img').src = "https://cf.shopee.vn/file/4bb95ddb2b8c9f0c89ff87847be2d174";
                    }

                    renderVoucherBlocks(result.vouchers);
                    updateDeeplinks(result.affiliateLink);
                }
            } catch (err) {
                console.log("Kích hoạt luồng chạy bảo hiểm khẩn cấp.");
                document.getElementById('prod-name').innerText = "Đã kích hoạt link tiếp thị liên kết thành công!";
                document.getElementById('prod-price').innerText = "Vui lòng mở App săn mã";
            } finally {
                btnSubmit.innerHTML = `<i class="fa-solid fa-cart-shopping text-sm"></i> Lấy link`;
                btnSubmit.disabled = false;
            }
        }

        function renderVoucherBlocks(vouchers) {
            const container = document.getElementById('voucher-container');
            container.innerHTML = '';

            let ytItems = vouchers.filter(v => v.type === 'YT');
            let fbItems = vouchers.filter(v => v.type === 'FB');

            if(ytItems.length > 0) {
                let html = `<div class="bg-[#11161d] border border-slate-800/80 rounded-2xl p-3 space-y-2 shadow-md">
                    <div class="text-[11px] font-bold text-red-400 bg-red-500/5 px-2 py-1 rounded-lg w-max flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span> Mã Youtube (${ytItems.length} mã)
                    </div><div class="space-y-2">`;
                ytItems.forEach(v => {
                    html += `<div class="bg-[#090d14]/40 border border-slate-800/40 rounded-xl p-3 text-xs space-y-1">
                        <div class="flex justify-between items-center"><span class="text-orange-400 font-bold font-mono text-sm">${v.code}</span><span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full font-bold">${v.usage}</span></div>
                        <div class="flex justify-between items-center text-slate-400 text-[11px]"><span>${v.desc}</span><span class="text-emerald-400 font-bold text-[10px]">${v.status}</span></div>
                    </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }

            if(fbItems.length > 0) {
                let html = `<div class="bg-[#11161d] border border-slate-800/80 rounded-2xl p-3 space-y-2 shadow-md">
                    <div class="text-[11px] font-bold text-blue-400 bg-blue-500/5 px-2 py-1 rounded-lg w-max flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> Mã Facebook (${fbItems.length} mã)
                    </div><div class="space-y-2">`;
                fbItems.forEach(v => {
                    html += `<div class="bg-[#090d14]/40 border border-slate-800/40 rounded-xl p-3 text-xs space-y-1">
                        <div class="flex justify-between items-center"><span class="text-orange-400 font-bold font-mono text-sm">${v.code}</span><span class="text-[10px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded-full font-bold">${v.usage}</span></div>
                        <div class="flex justify-between items-center text-slate-400 text-[11px]"><span>${v.desc}</span><span class="text-emerald-400 font-bold text-[10px]">${v.status}</span></div>
                    </div>`;
                });
                html += `</div></div>`;
                container.innerHTML += html;
            }
        }

        function updateDeeplinks(url) {
            document.getElementById('btn-ytb').setAttribute('onclick', `navigator.clipboard.writeText('YOUTUBEJUL221319'); alert('Đã sao chép mã Youtube! Đang mở ứng dụng Shopee mua hàng...'); window.open('${url}', '_blank')`);
            document.getElementById('btn-fb').setAttribute('onclick', `navigator.clipboard.writeText('METAPAR1JULD22300'); alert('Đã sao chép mã Facebook! Đang mở ứng dụng Shopee mua hàng...'); window.open('${url}', '_blank')`);
            document.getElementById('btn-ig').setAttribute('onclick', `navigator.clipboard.writeText('METAPAR1JULD22300'); alert('Đã sao chép mã Instagram! Đang mở ứng dụng Shopee mua hàng...'); window.open('${url}', '_blank')`);
        }
    </script>
</body>
</html>
